<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Quest: The Balloon Wall Bet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { primary: '#6366f1', secondary: '#ec4899', darkbg: '#0f172a' } }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass-panel { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
        .spinning { animation: spin 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s ease-out forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-darkbg text-gray-800 dark:text-gray-100 min-h-screen flex flex-col overflow-x-hidden">

    <!-- DECLARACIÓN DE IMÁGENES -->
    <script>
        const ASSETS = {
            burgerImage: 'image.png', // Imagen local de la hamburguesa
            jeronimo: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Jeronimo&backgroundColor=ffdfbf',
            dilan: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Dilan&backgroundColor=c0aede',
            enciso: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Enciso&backgroundColor=ffdfbf',
            giovani: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Giovani&style=circle&backgroundColor=ffb6c1'
        };
    </script>

    <div id="app" class="flex-grow flex flex-col relative">
        
        <!-- Navbar -->
        <nav class="glass-panel p-4 flex justify-between items-center z-10 sticky top-0">
            <div class="flex items-center gap-2 text-xl font-bold text-primary">
                <i class="fa-solid fa-gamepad"></i> Verb Quest
            </div>
            <div id="user-stats" class="hidden flex items-center gap-4 text-sm font-semibold">
                <span class="text-yellow-400"><i class="fa-solid fa-coins"></i> <span id="nav-coins">0</span></span>
                <span class="text-blue-400"><i class="fa-solid fa-star"></i> Nvl <span id="nav-level">1</span></span>
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition"><i class="fa-solid fa-moon"></i></button>
            </div>
        </nav>

        <!-- Pantalla de Login -->
        <div id="screen-login" class="flex-grow flex items-center justify-center p-4">
            <div class="glass-panel p-8 rounded-2xl max-w-md w-full text-center animate-pop">
                <h1 class="text-3xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">Verb Quest</h1>
                <p class="mb-6 text-sm opacity-80">Aprende verbos irregulares.</p>
                <input type="text" id="nickname-input" placeholder="Ingresa tu Nickname" class="w-full p-3 rounded-lg bg-gray-50 dark:bg-gray-800 border dark:border-gray-600 mb-4 focus:ring-2 focus:ring-primary outline-none dark:text-white">
                <button onclick="login()" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-bold py-3 px-4 rounded-lg hover:scale-105 transition shadow-lg">Comenzar</button>
            </div>
        </div>

        <!-- Menú Principal -->
        <div id="screen-menu" class="hidden flex-grow flex flex-col items-center p-4">
            <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6 mt-4">
                
                <div class="glass-panel p-6 rounded-2xl flex flex-col items-center col-span-1 animate-pop">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Player" id="player-avatar" class="w-24 h-24 bg-gray-200 rounded-full mb-4 border-4 border-secondary">
                    <h2 id="menu-nickname" class="text-2xl font-bold">Jugador</h2>
                    <div class="w-full bg-gray-300 dark:bg-gray-700 rounded-full h-4 mb-2 mt-4 overflow-hidden relative">
                        <div id="xp-bar" class="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full transition-all duration-500" style="width: 0%;"></div>
                    </div>
                    <p class="text-xs opacity-70 mb-4">XP: <span id="menu-xp">0</span> / <span id="menu-xp-max">100</span></p>
                    
                    <!-- Opción Multijugador -->
                    <div class="w-full p-3 bg-gray-200 dark:bg-gray-800 rounded-lg flex items-center justify-between mb-2">
                        <span class="text-sm font-bold"><i class="fa-solid fa-users"></i> Multijugador Local</span>
                        <input type="checkbox" id="multiplayer-toggle" class="w-5 h-5 accent-primary cursor-pointer">
                    </div>
                    <p class="text-[10px] text-center opacity-60 mb-4">Actívalo para jugar 1vs1 por turnos en cualquier modo.</p>
                </div>

                <div class="col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button onclick="startStoryMode()" class="glass-panel p-6 rounded-2xl text-left hover:border-primary transition group relative animate-pop">
                        <i class="fa-solid fa-book-open text-3xl text-primary mb-3 block group-hover:scale-110 transition"></i>
                        <h3 class="text-xl font-bold">Modo Historia</h3>
                    </button>
                    <button onclick="showDifficultySelect('ruleta')" class="glass-panel p-6 rounded-2xl text-left hover:border-secondary transition group relative animate-pop">
                        <i class="fa-solid fa-life-ring text-3xl text-secondary mb-3 block group-hover:rotate-180 transition"></i>
                        <h3 class="text-xl font-bold">Ruleta Verbal</h3>
                    </button>
                    <button onclick="showDifficultySelect('tabla')" class="glass-panel p-6 rounded-2xl text-left hover:border-green-500 transition group relative animate-pop">
                        <i class="fa-solid fa-table text-3xl text-green-500 mb-3 block group-hover:-translate-y-1 transition"></i>
                        <h3 class="text-xl font-bold">Completa la Tabla</h3>
                    </button>
                    <button onclick="showDifficultySelect('oracion')" class="glass-panel p-6 rounded-2xl text-left hover:border-yellow-500 transition group relative animate-pop">
                        <i class="fa-solid fa-pen-to-square text-3xl text-yellow-500 mb-3 block group-hover:scale-110 transition"></i>
                        <h3 class="text-xl font-bold">Completar Oración</h3>
                    </button>
                </div>
            </div>
        </div>

        <!-- Pantalla de Dificultad -->
        <div id="screen-difficulty" class="hidden flex-grow flex items-center justify-center p-4">
            <div class="glass-panel p-8 rounded-2xl max-w-2xl w-full animate-pop text-center">
                <h2 class="text-3xl font-bold mb-6">Selecciona la Dificultad</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="startGame(currentMode, 'facil')" class="p-4 rounded-xl border-2 border-green-400 bg-green-400/10 hover:bg-green-400/20 transition">
                        <img id="img-dif-jero" class="w-16 h-16 mx-auto rounded-full mb-2 bg-white object-cover">
                        <span class="block font-bold text-green-500">Fácil</span><span class="text-xs opacity-75">5 Preguntas | 5 Vidas</span>
                    </button>
                    <button onclick="startGame(currentMode, 'medio')" class="p-4 rounded-xl border-2 border-blue-400 bg-blue-400/10 hover:bg-blue-400/20 transition">
                        <img id="img-dif-dilan" class="w-16 h-16 mx-auto rounded-full mb-2 bg-white object-cover">
                        <span class="block font-bold text-blue-500">Medio</span><span class="text-xs opacity-75">15 Preguntas | 3 Vidas</span>
                    </button>
                    <button onclick="startGame(currentMode, 'dificil')" class="p-4 rounded-xl border-2 border-red-500 bg-red-500/10 hover:bg-red-500/20 transition">
                        <img id="img-dif-enciso" class="w-16 h-16 mx-auto rounded-full mb-2 bg-white object-cover">
                        <span class="block font-bold text-red-500">Difícil</span><span class="text-xs opacity-75">30 Preguntas | 1 Vida</span>
                    </button>
                    <button onclick="startGame(currentMode, 'reloj')" class="p-4 rounded-xl border-2 border-purple-500 bg-purple-500/10 hover:bg-purple-500/20 transition">
                        <img id="img-dif-gio" class="w-16 h-16 mx-auto rounded-full mb-2 bg-white object-cover">
                        <span class="block font-bold text-purple-500">Contrarreloj</span><span class="text-xs opacity-75">Infinito | 1 Vida | 60s</span>
                    </button>
                </div>
                <button onclick="showScreen('screen-menu')" class="mt-8 text-sm underline opacity-70 hover:opacity-100">Volver al Menú</button>
            </div>
        </div>

        <!-- Contenedor del Juego Activo -->
        <div id="screen-game" class="hidden flex-grow flex flex-col items-center p-4">
            <div class="w-full max-w-3xl glass-panel p-6 rounded-2xl animate-pop relative">
                <button onclick="quitGame()" class="absolute top-4 right-4 text-red-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
                
                <div class="flex flex-col sm:flex-row justify-between items-center mb-4 border-b border-gray-200 dark:border-gray-700 pb-2">
                    <h2 id="game-title" class="text-xl font-bold uppercase tracking-wider text-primary mb-2 sm:mb-0"></h2>
                    
                    <div class="flex gap-4 font-mono text-sm items-center">
                        <!-- MultiPlayer turn indicator -->
                        <span id="turn-indicator" class="hidden bg-yellow-500 text-black px-3 py-1 rounded-full font-bold animate-pulse">Turno J1</span>
                        
                        <span id="q-counter-display" class="text-blue-400"><i class="fa-solid fa-list-ol"></i> <span id="q-val">0/5</span></span>
                        <span id="lives-display" class="text-red-500 tracking-widest">❤️❤️❤️</span>
                        <span id="game-score-display" class="text-green-500"><i class="fa-solid fa-star"></i> <span id="score-val">0</span></span>
                        <span id="game-timer-display" class="text-red-400 hidden"><i class="fa-solid fa-clock"></i> <span id="timer-val">60</span>s</span>
                    </div>
                </div>

                <div id="game-workspace" class="min-h-[300px] flex flex-col items-center justify-center"></div>
                
                <div class="mt-6 flex justify-between w-full items-center">
                    <p id="game-feedback" class="font-bold text-lg h-6"></p>
                    <button id="btn-next" onclick="nextRound()" class="hidden bg-primary text-white px-6 py-2 rounded-lg font-bold shadow-md hover:bg-indigo-600 transition">Siguiente <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </div>

        <!-- Modo Historia Container -->
        <!-- FONDO DEL MODO HISTORIA AQUÍ -->
        <div id="screen-story" class="hidden flex-grow flex flex-col items-center justify-end p-4 pb-10 bg-cover bg-center transition-all duration-1000 relative" style="background-image: url('https://images.unsplash.com/photo-1577896851231-70ef18881754?auto=format&fit=crop&w=1920&q=80');">
            <div class="absolute inset-0 bg-black/60 z-0"></div>
            
            <div class="z-10 w-full max-w-4xl flex items-end gap-4 mb-4">
                <img id="story-character-img" class="w-32 h-32 md:w-48 md:h-48 object-cover -mb-4 animate-pop drop-shadow-2xl">
                <div class="glass-panel bg-black/80 p-6 rounded-2xl w-full relative border-t-4 border-primary">
                    <h3 id="story-character-name" class="text-xl font-extrabold text-primary mb-2"></h3>
                    <p id="story-dialogue" class="text-lg text-white font-medium min-h-[3rem]"></p>
                    <button onclick="advanceStory()" class="absolute bottom-4 right-4 text-white opacity-70 hover:opacity-100 flex items-center gap-1 animate-pulse">Continuar <i class="fa-solid fa-caret-right"></i></button>
                </div>
            </div>
            
            <div id="story-reward-scene" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md text-center p-4">
                <h1 class="text-5xl font-extrabold text-yellow-400 mb-6 animate-pop">¡APUESTA GANADA!</h1>
                <div class="relative animate-pop" style="animation-delay: 0.5s;">
                    <div class="absolute inset-0 bg-yellow-400 blur-3xl opacity-30 rounded-full animate-pulse"></div>
                    <img id="final-burger-img" class="w-64 h-64 object-contain drop-shadow-[0_0_20px_rgba(255,255,255,0.8)] relative z-10 transition hover:scale-110">
                </div>
                <button onclick="finishStoryMode()" class="mt-8 bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:scale-105 transition">Volver al Menú</button>
            </div>
        </div>

    </div>

    <script>
        const verbData = [
            { inf: 'be', past: 'was/were', part: 'been', esp: 'ser/estar' },
            { inf: 'become', past: 'became', part: 'become', esp: 'convertirse' },
            { inf: 'begin', past: 'began', part: 'begun', esp: 'empezar' },
            { inf: 'bite', past: 'bit', part: 'bitten', esp: 'morder' },
            { inf: 'break', past: 'broke', part: 'broken', esp: 'romper' },
            { inf: 'bring', past: 'brought', part: 'brought', esp: 'traer' },
            { inf: 'build', past: 'built', part: 'built', esp: 'construir' },
            { inf: 'buy', past: 'bought', part: 'bought', esp: 'comprar' },
            { inf: 'can', past: 'could', part: '-', esp: 'poder' },
            { inf: 'catch', past: 'caught', part: 'caught', esp: 'atrapar' },
            { inf: 'choose', past: 'chose', part: 'chosen', esp: 'elegir' },
            { inf: 'come', past: 'came', part: 'come', esp: 'venir' },
            { inf: 'cost', past: 'cost', part: 'cost', esp: 'costar' },
            { inf: 'cut', past: 'cut', part: 'cut', esp: 'cortar' },
            { inf: 'do', past: 'did', part: 'done', esp: 'hacer' },
            { inf: 'draw', past: 'drew', part: 'drawn', esp: 'dibujar' },
            { inf: 'dream', past: 'dreamt/dreamed', part: 'dreamt/dreamed', esp: 'soñar' },
            { inf: 'drink', past: 'drank', part: 'drunk', esp: 'beber' },
            { inf: 'drive', past: 'drove', part: 'driven', esp: 'conducir' },
            { inf: 'eat', past: 'ate', part: 'eaten', esp: 'comer' },
            { inf: 'fall', past: 'fell', part: 'fallen', esp: 'caer' },
            { inf: 'feel', past: 'felt', part: 'felt', esp: 'sentir' },
            { inf: 'fight', past: 'fought', part: 'fought', esp: 'pelear' },
            { inf: 'find', past: 'found', part: 'found', esp: 'encontrar' },
            { inf: 'fly', past: 'flew', part: 'flown', esp: 'volar' },
            { inf: 'forget', past: 'forgot', part: 'forgotten', esp: 'olvidar' },
            { inf: 'get', past: 'got', part: 'got', esp: 'obtener' },
            { inf: 'give', past: 'gave', part: 'given', esp: 'dar' },
            { inf: 'go', past: 'went', part: 'gone', esp: 'ir' },
            { inf: 'grow', past: 'grew', part: 'grown', esp: 'crecer' },
            { inf: 'have', past: 'had', part: 'had', esp: 'tener' },
            { inf: 'hear', past: 'heard', part: 'heard', esp: 'escuchar' },
            { inf: 'hide', past: 'hid', part: 'hidden', esp: 'esconder' },
            { inf: 'hit', past: 'hit', part: 'hit', esp: 'golpear' },
            { inf: 'hold', past: 'held', part: 'held', esp: 'sostener' },
            { inf: 'hurt', past: 'hurt', part: 'hurt', esp: 'herir' },
            { inf: 'keep', past: 'kept', part: 'kept', esp: 'mantener' },
            { inf: 'know', past: 'knew', part: 'known', esp: 'saber' },
            { inf: 'lay', past: 'laid', part: 'laid', esp: 'poner/colocar' },
            { inf: 'learn', past: 'learnt/learned', part: 'learnt/learned', esp: 'aprender' }
        ];

        let user = { nickname: '', xp: 0, level: 1, coins: 0 };
        
        // Variables de Partida
        let currentMode = '';
        let currentDifficulty = '';
        let isMultiplayer = false;
        let p1Score = 0, p2Score = 0;
        let currentPlayer = 1; // 1 o 2

        let maxQuestions = 5;
        let currentQCount = 1;
        let lives = 3;
        
        let gameTimer = null;
        let timeLeft = 0;
        let currentVerb = null;
        
        // Variables Modo Historia
        let storyStep = 0;
        let isStoryMinigame = false;

        document.getElementById('img-dif-jero').src = ASSETS.jeronimo;
        document.getElementById('img-dif-dilan').src = ASSETS.dilan;
        document.getElementById('img-dif-enciso').src = ASSETS.enciso;
        document.getElementById('img-dif-gio').src = ASSETS.giovani;
        document.getElementById('final-burger-img').src = ASSETS.burgerImage;

        window.onload = () => {
            const savedUser = localStorage.getItem('verbQuestUser');
            if (savedUser) { user = JSON.parse(savedUser); updateNavStats(); showScreen('screen-menu'); } 
            else { showScreen('screen-login'); }
            if (localStorage.theme === 'light') document.documentElement.classList.remove('dark');
        };

        function saveGame() { localStorage.setItem('verbQuestUser', JSON.stringify(user)); updateNavStats(); }
        function login() { const n = document.getElementById('nickname-input').value.trim(); if(n.length<3)return; user.nickname = n; saveGame(); showScreen('screen-menu'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; }
        
        function showScreen(id) {
            ['screen-login', 'screen-menu', 'screen-difficulty', 'screen-game', 'screen-story'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if (id === 'screen-menu') updateMenuUI();
        }

        function updateNavStats() {
            document.getElementById('user-stats').classList.remove('hidden');
            document.getElementById('nav-coins').innerText = user.coins;
            document.getElementById('nav-level').innerText = user.level;
        }

        function updateMenuUI() {
            document.getElementById('menu-nickname').innerText = user.nickname;
            document.getElementById('menu-xp').innerText = user.xp;
            let reqXp = user.level * 100;
            document.getElementById('menu-xp-max').innerText = reqXp;
            document.getElementById('xp-bar').style.width = Math.min((user.xp / reqXp) * 100, 100) + '%';
        }

        function showDifficultySelect(mode) { currentMode = mode; showScreen('screen-difficulty'); }

        function updateHearts() {
            let h = ''; for(let i=0; i<lives; i++) h += '❤️';
            document.getElementById('lives-display').innerText = h;
        }

        function startGame(mode, difficulty) {
            currentMode = mode;
            currentDifficulty = difficulty;
            isMultiplayer = document.getElementById('multiplayer-toggle').checked && !isStoryMinigame;
            
            p1Score = 0; p2Score = 0; currentPlayer = 1;
            currentQCount = 1;
            
            // Configurar Vidas y Preguntas por dificultad
            if (difficulty === 'facil') { maxQuestions = 5; lives = 5; }
            else if (difficulty === 'medio') { maxQuestions = 15; lives = 3; }
            else if (difficulty === 'dificil') { maxQuestions = 30; lives = 1; }
            else if (difficulty === 'reloj') { maxQuestions = 999; lives = 1; } // Reloj es infinito hasta perder
            
            updateHearts();
            document.getElementById('score-val').innerText = isMultiplayer ? "J1:0 | J2:0" : "0";
            
            const turnInd = document.getElementById('turn-indicator');
            if(isMultiplayer) { turnInd.classList.remove('hidden'); turnInd.innerText = "Turno J1"; } 
            else { turnInd.classList.add('hidden'); }
            
            showScreen('screen-game');
            let t = mode === 'ruleta' ? 'Ruleta Verbal' : mode === 'tabla' ? 'Completa la Tabla' : 'Completar Oración';
            document.getElementById('game-title').innerText = `${t} (${difficulty})`;

            const timerEl = document.getElementById('game-timer-display');
            if (difficulty === 'reloj') {
                timerEl.classList.remove('hidden'); timeLeft = 60; document.getElementById('timer-val').innerText = timeLeft;
                clearInterval(gameTimer);
                gameTimer = setInterval(() => {
                    timeLeft--; document.getElementById('timer-val').innerText = timeLeft;
                    if (timeLeft <= 0) endGame("¡Se acabó el tiempo!");
                }, 1000);
            } else { timerEl.classList.add('hidden'); }

            renderRound();
        }

        function renderRound() {
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('game-feedback').innerText = '';
            document.getElementById('game-workspace').innerHTML = '';
            
            // Actualizar UI Contador
            let qStr = currentDifficulty === 'reloj' ? `${currentQCount}/∞` : `${currentQCount}/${maxQuestions}`;
            document.getElementById('q-val').innerText = qStr;

            currentVerb = verbData[Math.floor(Math.random() * verbData.length)];

            if (currentMode === 'ruleta') renderRuleta();
            else if (currentMode === 'tabla') renderTabla();
            else if (currentMode === 'oracion') renderOracion();
        }

        function renderRuleta() {
            const ws = document.getElementById('game-workspace');
            ws.innerHTML = `
                <div class="relative w-48 h-48 mx-auto mb-8">
                    <div id="roulette-wheel" class="w-full h-full rounded-full border-8 border-primary bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center shadow-[0_0_30px_rgba(99,102,241,0.5)]">
                        <span id="roulette-verb" class="text-3xl font-extrabold text-white">?</span>
                    </div>
                    <div class="absolute top-[-10px] left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[25px] border-t-yellow-400 drop-shadow-md z-10"></div>
                </div>
                <button id="btn-spin" onclick="spinRoulette()" class="bg-primary text-white font-bold py-3 px-8 rounded-full shadow-lg hover:scale-105 transition mb-6">Girar Ruleta</button>
                <div id="ruleta-inputs" class="w-full max-w-md hidden grid gap-4">
                    <input type="text" id="in-past" placeholder="Pasado Simple" class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border outline-none focus:ring-2 focus:ring-primary dark:text-white">
                    <input type="text" id="in-part" placeholder="Participio Pasado" class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border outline-none focus:ring-2 focus:ring-primary dark:text-white">
                    <input type="text" id="in-esp" placeholder="Significado en Español" class="w-full p-3 rounded bg-gray-100 dark:bg-gray-800 border outline-none focus:ring-2 focus:ring-primary dark:text-white">
                    <button onclick="checkRuleta()" class="bg-green-500 text-white font-bold py-2 rounded shadow hover:bg-green-600 transition mt-2">Comprobar</button>
                </div>
            `;
        }

        function spinRoulette() {
            document.getElementById('btn-spin').classList.add('hidden');
            const wheel = document.getElementById('roulette-wheel');
            wheel.classList.add('spinning');
            setTimeout(() => {
                wheel.classList.remove('spinning');
                document.getElementById('roulette-verb').innerText = currentVerb.inf;
                document.getElementById('ruleta-inputs').classList.remove('hidden');
                if (currentDifficulty === 'facil') { document.getElementById('in-part').classList.add('hidden'); document.getElementById('in-esp').classList.add('hidden'); } 
                else if (currentDifficulty === 'medio') { document.getElementById('in-esp').classList.add('hidden'); }
            }, 3000);
        }

        function checkRuleta() {
            let passed = true;
            let valPast = document.getElementById('in-past').value.trim().toLowerCase();
            let valPart = document.getElementById('in-part') ? document.getElementById('in-part').value.trim().toLowerCase() : '';
            let valEsp = document.getElementById('in-esp') ? document.getElementById('in-esp').value.trim().toLowerCase() : '';
            const checkMatch = (i, t) => t === '-' ? (i === '' || i === '-') : (t.includes(i) && i.length > 1);
            if (!checkMatch(valPast, currentVerb.past)) passed = false;
            if (currentDifficulty !== 'facil' && !checkMatch(valPart, currentVerb.part)) passed = false;
            if (currentDifficulty === 'dificil' && !currentVerb.esp.includes(valEsp)) passed = false;
            handleResult(passed, `Era: ${currentVerb.past} / ${currentVerb.part} / ${currentVerb.esp}`);
        }

        function renderTabla() {
            const ws = document.getElementById('game-workspace');
            const showIdx = Math.floor(Math.random() * 4); 
            let v = [
                showIdx===0?`<div class="p-3 bg-primary/20 rounded font-bold">${currentVerb.inf}</div>`:`<input type="text" id="t-inf" class="w-full p-3 rounded border dark:bg-gray-800 outline-none focus:ring-2">`,
                showIdx===1?`<div class="p-3 bg-primary/20 rounded font-bold">${currentVerb.past}</div>`:`<input type="text" id="t-past" class="w-full p-3 rounded border dark:bg-gray-800 outline-none focus:ring-2">`,
                showIdx===2?`<div class="p-3 bg-primary/20 rounded font-bold">${currentVerb.part}</div>`:`<input type="text" id="t-part" class="w-full p-3 rounded border dark:bg-gray-800 outline-none focus:ring-2">`,
                showIdx===3?`<div class="p-3 bg-primary/20 rounded font-bold">${currentVerb.esp}</div>`:`<input type="text" id="t-esp" class="w-full p-3 rounded border dark:bg-gray-800 outline-none focus:ring-2">`
            ];
            ws.innerHTML = `
                <div class="w-full max-w-2xl grid grid-cols-2 md:grid-cols-4 gap-2 mb-6">
                    <div class="font-bold text-center text-xs uppercase opacity-70 mb-1">Infinitive</div><div class="font-bold text-center text-xs uppercase opacity-70 mb-1">Past Simple</div>
                    <div class="font-bold text-center text-xs uppercase opacity-70 mb-1">Past Part.</div><div class="font-bold text-center text-xs uppercase opacity-70 mb-1">Meaning</div>
                    ${v[0]}${v[1]}${v[2]}${v[3]}
                </div>
                <button onclick="checkTabla(${showIdx})" class="bg-green-500 text-white font-bold py-2 px-8 rounded shadow hover:bg-green-600 transition">Comprobar</button>
            `;
        }

        function checkTabla(showIdx) {
            let passed = true;
            if (showIdx !== 0 && document.getElementById('t-inf').value.trim().toLowerCase() !== currentVerb.inf) passed = false;
            if (showIdx !== 1 && !currentVerb.past.includes(document.getElementById('t-past').value.trim().toLowerCase())) passed = false;
            if (showIdx !== 2 && !currentVerb.part.includes(document.getElementById('t-part').value.trim().toLowerCase())) passed = false;
            if (showIdx !== 3 && !currentVerb.esp.includes(document.getElementById('t-esp').value.trim().toLowerCase())) passed = false;
            handleResult(passed, `Era: ${currentVerb.inf} | ${currentVerb.past} | ${currentVerb.part} | ${currentVerb.esp}`);
        }

        function renderOracion() {
            const ws = document.getElementById('game-workspace');
            ws.innerHTML = `
                <p class="text-xl mb-6 text-center">I usually ____ (${currentVerb.inf}) early, but yesterday I <input type="text" id="o-ans" class="w-32 border-b-2 border-primary bg-transparent text-center font-bold outline-none dark:text-white"> late.</p>
                <button onclick="checkOracion()" class="bg-green-500 text-white font-bold py-2 px-8 rounded shadow hover:bg-green-600 transition">Comprobar</button>
            `;
        }
        function checkOracion() {
            let val = document.getElementById('o-ans').value.trim().toLowerCase();
            handleResult(currentVerb.past.includes(val) && val.length > 1, `El pasado de ${currentVerb.inf} es ${currentVerb.past}.`);
        }

        function handleResult(isCorrect, msgError) {
            const feedback = document.getElementById('game-feedback');
            const ws = document.getElementById('game-workspace');
            
            if (isCorrect) {
                feedback.innerHTML = `<span class="text-green-500"><i class="fa-solid fa-check"></i> ¡Correcto! +10 Puntos</span>`;
                if(currentPlayer === 1) p1Score += 10; else p2Score += 10;
                user.coins += 2; user.xp += 5;
            } else {
                ws.classList.add('animate-shake'); setTimeout(() => ws.classList.remove('animate-shake'), 300);
                feedback.innerHTML = `<span class="text-red-500"><i class="fa-solid fa-xmark"></i> Incorrecto. ${msgError}</span>`;
                lives--;
                updateHearts();
            }

            // Update scores
            if(isMultiplayer) document.getElementById('score-val').innerText = `J1:${p1Score} | J2:${p2Score}`;
            else document.getElementById('score-val').innerText = p1Score;

            ws.querySelectorAll('button').forEach(b => b.classList.add('hidden'));
            
            // Check Game Over Conditions
            if (lives <= 0) {
                setTimeout(() => endGame("¡Te quedaste sin vidas!"), 1500);
            } else if (currentQCount >= maxQuestions && currentDifficulty !== 'reloj') {
                setTimeout(() => endGame("¡Completaste todas las preguntas!"), 1500);
            } else {
                document.getElementById('btn-next').classList.remove('hidden');
            }
        }

        function nextRound() {
            currentQCount++;
            if(isMultiplayer) {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                const turnInd = document.getElementById('turn-indicator');
                turnInd.innerText = `Turno J${currentPlayer}`;
                turnInd.className = currentPlayer === 1 ? "bg-yellow-500 text-black px-3 py-1 rounded-full font-bold animate-pulse" : "bg-blue-500 text-white px-3 py-1 rounded-full font-bold animate-pulse";
            }
            renderRound();
        }

        function quitGame() { clearInterval(gameTimer); isStoryMinigame = false; showScreen('screen-menu'); }

        function endGame(reason) {
            clearInterval(gameTimer);
            
            // Lógica si perdemos en el minijuego del modo historia
            if (isStoryMinigame) {
                if (lives <= 0) {
                    alert(`Has fallado. Debes repasar y volver a intentarlo para continuar la historia.`);
                    storyStep--; // Retroceder un diálogo
                    showScreen('screen-story');
                    renderStoryScene();
                } else {
                    alert(`¡Reto superado! Continuamos con la construcción.`);
                    showScreen('screen-story');
                    advanceStory();
                }
                isStoryMinigame = false;
                return;
            }

            // Final normal
            let msg = `${reason}\n\n`;
            if (isMultiplayer) {
                msg += `Puntuación J1: ${p1Score}\nPuntuación J2: ${p2Score}\n`;
                msg += p1Score > p2Score ? "¡Gana el Jugador 1!" : p2Score > p1Score ? "¡Gana el Jugador 2!" : "¡Empate!";
            } else {
                msg += `Puntuación final: ${p1Score}\n¡Ganaste ${Math.floor(p1Score/5)} Monedas!`;
                user.coins += Math.floor(p1Score/5);
            }
            alert(msg);
            saveGame();
            quitGame();
        }

        // --- MODO HISTORIA ---
        const storySequence = [
            { char: 'Jerónimo', img: ASSETS.jeronimo, text: "¡El English Day es la próxima semana! ¿Y si construimos una pared de globos gigante?" },
            { char: 'Enciso', img: ASSETS.enciso, text: "Suena increíble, pero tomará mucho trabajo y saber las instrucciones en inglés." },
            { char: 'Giovani', img: ASSETS.giovani, text: "Escuché su plan. Imposible. Nunca terminarán a tiempo." },
            { char: 'Jerónimo', img: ASSETS.jeronimo, text: "¿Apostamos? Si queda increíble, usted nos invita una hamburguesa a todos." },
            { char: 'Giovani', img: ASSETS.giovani, text: "Trato hecho. Pero primero, pasen esta prueba para demostrar que saben leer los manuales." },
            { type: 'minigame' },
            { char: 'Giovani', img: ASSETS.giovani, text: "(Días después) La pared se ve... decente. Pero yo no recuerdo haber hecho ninguna apuesta..." },
            { char: 'Dilan', img: ASSETS.dilan, text: "Un momento, profe. Yo estaba aquí. Usted dijo claramente 'Trato hecho'." },
            { char: 'Giovani', img: ASSETS.giovani, text: "Rayos. Me descubrieron. Una promesa es una promesa." },
            { type: 'reward' }
        ];

        function startStoryMode() { storyStep = 0; showScreen('screen-story'); document.getElementById('story-reward-scene').classList.add('hidden'); renderStoryScene(); }

        function renderStoryScene() {
            if (storyStep >= storySequence.length) { finishStoryMode(); return; }
            const scene = storySequence[storyStep];

            if (scene.type === 'minigame') {
                isStoryMinigame = true;
                storyStep++; // Avanzar internamente para cuando volvamos
                startGame('ruleta', 'medio'); // Reto de la historia
                return;
            }

            if (scene.type === 'reward') {
                document.getElementById('story-reward-scene').classList.remove('hidden');
                user.xp += 500; user.coins += 200; saveGame(); return;
            }

            const imgEl = document.getElementById('story-character-img');
            imgEl.classList.remove('animate-pop'); void imgEl.offsetWidth; imgEl.classList.add('animate-pop');
            imgEl.src = scene.img;
            document.getElementById('story-character-name').innerText = scene.char;
            
            const textEl = document.getElementById('story-dialogue');
            textEl.innerHTML = ''; let i = 0;
            const typeWriter = setInterval(() => {
                if (i < scene.text.length) { textEl.innerHTML += scene.text.charAt(i); i++; } 
                else clearInterval(typeWriter);
            }, 30);
        }

        function advanceStory() { storyStep++; renderStoryScene(); }
        function finishStoryMode() { isStoryMinigame = false; saveGame(); showScreen('screen-menu'); }

    </script>
</body>
</html>
