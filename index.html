<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstaDuo — Estadística Interactiva</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #58CC02;
  --green-dark: #46A302;
  --green-light: #89E219;
  --gold: #FFC200;
  --gold-dark: #E6AC00;
  --blue: #1CB0F6;
  --blue-dark: #0099DD;
  --purple: #CE82FF;
  --red: #FF4B4B;
  --orange: #FF9600;
  --gray-100: #F7F7F7;
  --gray-200: #E5E5E5;
  --gray-300: #AFAFAF;
  --gray-500: #777;
  --gray-700: #3C3C3C;
  --gray-900: #1F1F1F;
  --white: #FFFFFF;
  --shadow: 0 4px 0px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'Nunito', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--gray-100);
  color: var(--gray-900);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ===== SPLASH ===== */
#splash {
  background: linear-gradient(135deg, #58CC02 0%, #46A302 50%, #1CB0F6 100%);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
}
.splash-logo { font-size: 72px; margin-bottom: 16px; animation: bounce 1s ease infinite alternate; }
.splash-title { font-size: 48px; font-weight: 900; color: white; text-shadow: 0 4px 0 rgba(0,0,0,0.2); letter-spacing: -1px; }
.splash-sub { font-size: 18px; color: rgba(255,255,255,0.9); margin: 12px 0 40px; font-weight: 600; }
.btn-start {
  background: white;
  color: var(--green-dark);
  border: none;
  padding: 18px 48px;
  border-radius: 50px;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  transition: all 0.15s;
  font-family: var(--font);
  letter-spacing: 0.5px;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.2); }
.btn-start:active { transform: translateY(2px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

/* ===== COURSE MAP ===== */
#map-screen {
  background: var(--gray-100);
  flex-direction: column;
}
.map-header {
  background: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  position: sticky;
  top: 0;
  z-index: 100;
}
.map-header-title { font-size: 22px; font-weight: 900; color: var(--gray-900); flex: 1; }
.xp-badge {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: white;
  padding: 6px 14px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.15);
}
.streak-badge {
  background: linear-gradient(135deg, var(--orange), #FF6B00);
  color: white;
  padding: 6px 14px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.15);
}
.course-banner {
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  margin: 20px;
  border-radius: var(--radius);
  padding: 24px;
  color: white;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-lg);
}
.course-banner-icon { font-size: 48px; }
.course-banner-text h2 { font-size: 22px; font-weight: 900; }
.course-banner-text p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
.course-progress-bar {
  background: rgba(255,255,255,0.25);
  border-radius: 50px;
  height: 8px;
  margin-top: 10px;
  overflow: hidden;
}
.course-progress-fill {
  background: white;
  height: 100%;
  border-radius: 50px;
  transition: width 0.5s ease;
}

.lessons-container { padding: 0 20px 100px; }
.unit-label {
  text-align: center;
  margin: 24px 0 16px;
}
.unit-label-inner {
  display: inline-block;
  background: var(--purple);
  color: white;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: 0 3px 0 rgba(150,50,200,0.4);
}

.lesson-path {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.lesson-node-row {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin-bottom: 8px;
}
.lesson-node-row:nth-child(odd) { padding-left: 60px; }
.lesson-node-row:nth-child(even) { padding-right: 60px; }

.lesson-btn {
  background: var(--green);
  border: none;
  border-radius: 50%;
  width: 80px;
  height: 80px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 5px 0 var(--green-dark);
  transition: all 0.15s;
  position: relative;
  font-family: var(--font);
  color: white;
  flex-shrink: 0;
}
.lesson-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--green-dark); }
.lesson-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 var(--green-dark); }
.lesson-btn.locked {
  background: var(--gray-200);
  box-shadow: 0 5px 0 var(--gray-300);
  cursor: not-allowed;
}
.lesson-btn.locked:hover { transform: none; }
.lesson-btn.completed {
  background: var(--gold);
  box-shadow: 0 5px 0 var(--gold-dark);
}
.lesson-btn.completed:hover { box-shadow: 0 8px 0 var(--gold-dark); transform: translateY(-3px); }
.lesson-btn .lesson-icon { font-size: 28px; }
.lesson-btn .lesson-num { font-size: 11px; font-weight: 800; margin-top: 2px; }
.lesson-crown {
  position: absolute;
  top: -14px;
  font-size: 20px;
  animation: float 2s ease-in-out infinite;
}
.lesson-stars {
  display: flex;
  gap: 2px;
  margin-top: 3px;
}
.lesson-star { font-size: 10px; }

.lesson-card {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  margin-left: 12px;
  flex: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  max-width: 220px;
}
.lesson-card-title { font-size: 13px; font-weight: 800; color: var(--gray-900); }
.lesson-card-phases { display: flex; gap: 6px; margin-top: 8px; }
.phase-dot {
  width: 24px;
  height: 8px;
  border-radius: 4px;
  background: var(--gray-200);
  transition: background 0.3s;
}
.phase-dot.done { background: var(--gold); }

/* ===== LESSON DETAIL ===== */
#lesson-screen {
  background: var(--gray-100);
}
.lesson-header {
  background: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.btn-back {
  background: none;
  border: 2px solid var(--gray-200);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--gray-700);
  transition: all 0.15s;
}
.btn-back:hover { background: var(--gray-100); border-color: var(--gray-300); }
.lesson-header-title { font-size: 18px; font-weight: 800; flex: 1; }
.lesson-body { padding: 24px 20px; }
.lesson-detail-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
.lesson-detail-sub { font-size: 15px; color: var(--gray-500); margin-bottom: 28px; }

.phases-grid { display: flex; flex-direction: column; gap: 16px; }
.phase-card {
  background: white;
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.2s;
  border: 3px solid transparent;
}
.phase-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--green); }
.phase-card.locked { opacity: 0.5; cursor: not-allowed; }
.phase-card.locked:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-color: transparent; }
.phase-card.completed { border-color: var(--gold); }
.phase-icon-wrap {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.phase-card.completed .phase-icon-wrap { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); }
.phase-card-info { flex: 1; }
.phase-card-title { font-size: 16px; font-weight: 800; }
.phase-card-sub { font-size: 13px; color: var(--gray-500); margin-top: 3px; }
.phase-card-sub span { color: var(--green); font-weight: 700; }
.phase-card.completed .phase-card-sub span { color: var(--gold-dark); }
.phase-badge {
  background: var(--green);
  color: white;
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 800;
}
.phase-card.completed .phase-badge { background: var(--gold); }
.phase-card.locked .phase-badge { background: var(--gray-300); }

/* ===== QUIZ SCREEN ===== */
#quiz-screen {
  background: white;
  flex-direction: column;
}
.quiz-topbar {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.btn-close-quiz {
  background: none;
  border: 2px solid var(--gray-200);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--gray-700);
}
.quiz-progress-bar {
  flex: 1;
  background: var(--gray-200);
  border-radius: 50px;
  height: 16px;
  overflow: hidden;
}
.quiz-progress-fill {
  background: linear-gradient(90deg, var(--green), var(--green-light));
  height: 100%;
  border-radius: 50px;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.quiz-hearts { display: flex; gap: 4px; font-size: 20px; }

.quiz-content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
}
.question-wrap { animation: fadeSlideIn 0.4s ease; }
.question-type-badge {
  display: inline-block;
  background: var(--blue);
  color: white;
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.question-text {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.35;
  margin-bottom: 8px;
}
.question-sub {
  font-size: 14px;
  color: var(--gray-500);
  margin-bottom: 24px;
  line-height: 1.5;
}
.question-context {
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.6;
}
.question-context table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
.question-context th, .question-context td {
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--gray-200);
  font-size: 13px;
}
.question-context th {
  background: var(--blue);
  color: white;
  font-weight: 700;
}
.question-context tr:nth-child(even) td { background: var(--gray-100); }

/* Multiple Choice */
.choices-grid {
  display: grid;
  gap: 10px;
}
.choice-btn {
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  cursor: pointer;
  text-align: left;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--gray-900);
}
.choice-btn:hover:not(.disabled) { border-color: var(--blue); background: #EFF8FF; }
.choice-btn.selected { border-color: var(--blue); background: #EFF8FF; }
.choice-btn.correct { border-color: var(--green); background: #F0FFF0; color: var(--green-dark); }
.choice-btn.wrong { border-color: var(--red); background: #FFF0F0; color: var(--red); }
.choice-btn.disabled { cursor: not-allowed; }
.choice-letter {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  flex-shrink: 0;
  border: 2px solid var(--gray-200);
  transition: all 0.15s;
}
.choice-btn.selected .choice-letter { background: var(--blue); color: white; border-color: var(--blue); }
.choice-btn.correct .choice-letter { background: var(--green); color: white; border-color: var(--green); }
.choice-btn.wrong .choice-letter { background: var(--red); color: white; border-color: var(--red); }

/* True/False */
.tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.tf-btn {
  background: white;
  border: 3px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 24px 16px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 18px;
  font-weight: 800;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  color: var(--gray-900);
}
.tf-btn:hover:not(.disabled) { transform: translateY(-2px); }
.tf-btn.true-btn:hover:not(.disabled) { border-color: var(--green); background: #F0FFF0; }
.tf-btn.false-btn:hover:not(.disabled) { border-color: var(--red); background: #FFF0F0; }
.tf-btn.correct { border-color: var(--green); background: #F0FFF0; color: var(--green-dark); }
.tf-btn.wrong { border-color: var(--red); background: #FFF0F0; color: var(--red); }
.tf-icon { font-size: 36px; }

/* Fill blank */
.fill-blank-area { margin: 16px 0; }
.blank-sentence {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.8;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.blank-input {
  border: none;
  border-bottom: 3px solid var(--blue);
  padding: 4px 8px;
  font-size: 18px;
  font-weight: 800;
  font-family: var(--font);
  color: var(--blue-dark);
  background: transparent;
  min-width: 120px;
  text-align: center;
  outline: none;
}
.blank-input.correct { border-color: var(--green); color: var(--green-dark); }
.blank-input.wrong { border-color: var(--red); color: var(--red); }

/* Word bank */
.word-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 20px;
  min-height: 48px;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 12px;
}
.word-chip {
  background: white;
  border: 2px solid var(--blue);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  color: var(--blue-dark);
  transition: all 0.15s;
  user-select: none;
}
.word-chip:hover { background: var(--blue); color: white; transform: translateY(-1px); }
.word-chip.used { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

/* Drag & Drop */
.drag-drop-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 16px 0;
}
.drop-targets {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.drop-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.drop-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--gray-700);
  min-width: 100px;
  text-align: right;
}
.drop-zone {
  flex: 1;
  min-height: 44px;
  border: 2px dashed var(--gray-300);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--gray-300);
  transition: all 0.2s;
  padding: 6px;
}
.drop-zone.drag-over { border-color: var(--blue); background: #EFF8FF; }
.drop-zone.has-item { border-style: solid; border-color: var(--blue); background: white; }
.drop-zone.correct-zone { border-color: var(--green); background: #F0FFF0; }
.drop-zone.wrong-zone { border-color: var(--red); background: #FFF0F0; }
.drag-item {
  background: white;
  border: 2px solid var(--blue);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--blue-dark);
  cursor: grab;
  user-select: none;
  transition: all 0.15s;
}
.drag-item:active { cursor: grabbing; transform: scale(1.05); box-shadow: var(--shadow-lg); }
.drag-items-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 14px;
  min-height: 60px;
}

/* Match pairs */
.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 16px 0;
}
.match-col { display: flex; flex-direction: column; gap: 8px; }
.match-item {
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  line-height: 1.4;
}
.match-item:hover { border-color: var(--blue); background: #EFF8FF; }
.match-item.selected { border-color: var(--blue); background: var(--blue); color: white; }
.match-item.matched { border-color: var(--green); background: #F0FFF0; cursor: default; }
.match-item.wrong-match { border-color: var(--red); background: #FFF0F0; animation: shake 0.3s; }
.match-item.pair-1 { border-color: var(--purple); background: #F9F0FF; }
.match-item.pair-2 { border-color: var(--orange); background: #FFF7F0; }
.match-item.pair-3 { border-color: var(--green); background: #F0FFF0; }
.match-item.pair-4 { border-color: var(--blue); background: #EFF8FF; }

/* Order sequence */
.order-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 16px 0;
}
.order-item {
  background: white;
  border: 2px solid var(--gray-200);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: grab;
  transition: all 0.2s;
  font-size: 14px;
  font-weight: 700;
  user-select: none;
}
.order-item:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.order-item.dragging { opacity: 0.5; border-color: var(--blue); }
.order-item.drag-over-top { border-top: 3px solid var(--green); }
.order-item.drag-over-bottom { border-bottom: 3px solid var(--green); }
.order-handle { color: var(--gray-300); font-size: 18px; }
.order-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--blue);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
}

/* Graph interpretation */
.graph-container {
  background: var(--gray-100);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
  overflow-x: auto;
}
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 150px;
  padding: 0 8px;
}
.bar-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.bar {
  width: 100%;
  background: var(--blue);
  border-radius: 6px 6px 0 0;
  transition: all 0.3s;
  position: relative;
}
.bar-val {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 800;
  color: var(--gray-700);
}
.bar-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-align: center; }

/* Timer */
.timer-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 16px;
}
.timer-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--orange);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 4px 0 #CC7000;
  transition: background 0.3s;
}
.timer-circle.urgent { background: var(--red); box-shadow: 0 4px 0 #CC0000; animation: pulse 0.5s ease infinite; }

/* Answer bar */
.answer-bar {
  padding: 16px 20px;
  background: var(--gray-100);
  border-top: 2px solid var(--gray-200);
}
.btn-check {
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  display: block;
  background: var(--gray-300);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 17px;
  font-weight: 800;
  font-family: var(--font);
  cursor: not-allowed;
  box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.btn-check.ready {
  background: var(--green);
  cursor: pointer;
  box-shadow: 0 4px 0 var(--green-dark);
}
.btn-check.ready:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--green-dark); }
.btn-check.ready:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }

/* Feedback overlay */
.feedback-bar {
  padding: 20px;
  display: none;
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
}
.feedback-bar.correct-fb { display: block; }
.feedback-bar.wrong-fb { display: block; }
.feedback-inner {
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.correct-fb .feedback-inner { background: #E5FFCC; border: 2px solid var(--green); }
.wrong-fb .feedback-inner { background: #FFE5E5; border: 2px solid var(--red); }
.feedback-icon { font-size: 28px; flex-shrink: 0; }
.feedback-title { font-size: 16px; font-weight: 900; }
.correct-fb .feedback-title { color: var(--green-dark); }
.wrong-fb .feedback-title { color: var(--red); }
.feedback-text { font-size: 13px; color: var(--gray-700); margin-top: 4px; line-height: 1.5; }
.btn-continue {
  margin-top: 12px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 800;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: 0 4px 0 var(--green-dark);
  transition: all 0.15s;
}
.wrong-fb .btn-continue { background: var(--red); box-shadow: 0 4px 0 #CC0000; }
.btn-continue:hover { transform: translateY(-1px); }
.btn-continue:active { transform: translateY(2px); }

/* Phase Complete */
#phase-complete {
  background: white;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
  flex-direction: column;
}
.complete-animation { font-size: 100px; animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); margin-bottom: 20px; }
.complete-title { font-size: 36px; font-weight: 900; color: var(--gray-900); margin-bottom: 8px; }
.complete-sub { font-size: 16px; color: var(--gray-500); margin-bottom: 32px; }
.stats-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.stat-box {
  background: var(--gray-100);
  border-radius: var(--radius);
  padding: 20px 28px;
  text-align: center;
  min-width: 110px;
}
.stat-val { font-size: 32px; font-weight: 900; color: var(--gray-900); }
.stat-label { font-size: 13px; font-weight: 700; color: var(--gray-500); margin-top: 4px; }
.xp-earned { color: var(--gold-dark); }
.btn-continue-big {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 18px 48px;
  font-size: 18px;
  font-weight: 800;
  font-family: var(--font);
  cursor: pointer;
  box-shadow: 0 5px 0 var(--green-dark);
  transition: all 0.15s;
}
.btn-continue-big:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--green-dark); }

/* Particles */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  animation: particleFly 1s ease-out forwards;
  font-size: 20px;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--gray-900);
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  z-index: 10000;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Animations */
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
@keyframes particleFly {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-120px) scale(0); opacity: 0; }
}
@keyframes goldGlow {
  0%,100% { box-shadow: 0 5px 0 var(--gold-dark), 0 0 20px rgba(255,194,0,0.3); }
  50% { box-shadow: 0 5px 0 var(--gold-dark), 0 0 40px rgba(255,194,0,0.6); }
}

.lesson-btn.just-completed { animation: goldGlow 1.5s ease infinite; }

/* Responsive */
@media (max-width: 480px) {
  .splash-title { font-size: 36px; }
  .question-text { font-size: 18px; }
  .tf-grid { grid-template-columns: 1fr 1fr; }
  .match-grid { grid-template-columns: 1fr 1fr; }
  .lesson-node-row:nth-child(odd) { padding-left: 30px; }
  .lesson-node-row:nth-child(even) { padding-right: 30px; }
  .lesson-card { display: none; }
  .lesson-btn { width: 72px; height: 72px; }
}

/* XP animation */
.xp-popup {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 22px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  animation: xpFloat 1.2s ease-out forwards;
}
@keyframes xpFloat {
  0% { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
}

/* Table builder */
.table-builder {
  overflow-x: auto;
  margin: 12px 0;
}
.table-builder table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.table-builder th {
  background: var(--blue);
  color: white;
  padding: 10px;
  font-weight: 800;
  text-align: center;
}
.table-builder td {
  padding: 8px 10px;
  border: 1px solid var(--gray-200);
  text-align: center;
}
.table-builder input {
  border: 2px solid var(--gray-200);
  border-radius: 6px;
  padding: 4px 8px;
  width: 70px;
  text-align: center;
  font-family: var(--font);
  font-weight: 700;
  font-size: 14px;
  outline: none;
}
.table-builder input:focus { border-color: var(--blue); }
.table-builder input.correct-cell { border-color: var(--green); background: #F0FFF0; color: var(--green-dark); }
.table-builder input.wrong-cell { border-color: var(--red); background: #FFF0F0; color: var(--red); }
</style>
</head>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA — 10 LESSONS × 3 PHASES × 5-8 QUESTIONS
// ============================================================
const LESSONS = [
  // LESSON 1
  {
    id: 1, title: "¿Qué es la Estadística?", icon: "🔢",
    sub: "Conceptos fundamentales y vocabulario básico",
    unit: "UNIDAD 1: CONCEPTOS BÁSICOS",
    phases: [
      {
        id: "1-1", name: "Conceptos básicos", icon: "📖",
        questions: [
          {
            type: "multiple",
            q: "¿Qué estudia la Estadística?",
            choices: ["La recolección, organización y análisis de datos","Solo la suma de números","Las figuras geométricas","Las ecuaciones algebraicas"],
            correct: 0,
            feedback: "La Estadística es la ciencia que estudia la recolección, organización, análisis e interpretación de datos para tomar decisiones."
          },
          {
            type: "tf",
            q: "Un conjunto de datos es una colección de valores o medidas obtenidas en una observación.",
            correct: true,
            feedback: "¡Correcto! Un conjunto de datos reúne valores obtenidos al medir o contar características de interés."
          },
          {
            type: "multiple",
            q: "¿Qué es una variable estadística?",
            choices: ["Una característica que puede tomar diferentes valores en cada individuo","Un número fijo que no cambia","Un tipo de gráfica","Un resultado siempre igual"],
            correct: 0,
            feedback: "Una variable estadística es cualquier característica que puede variar entre los elementos de un conjunto: altura, edad, calificaciones, etc."
          },
          {
            type: "tf",
            q: "Los datos cualitativos son aquellos que se expresan exclusivamente con números.",
            correct: false,
            feedback: "Falso. Los datos cualitativos expresan categorías o cualidades (color, sexo, tipo de animal). Los datos cuantitativos son los numéricos."
          },
          {
            type: "multiple",
            q: "¿Cuál de estos es un ejemplo de dato cuantitativo?",
            choices: ["Color favorito","Temperatura en °C","País de origen","Tipo de sangre"],
            correct: 1,
            feedback: "La temperatura en °C es un dato cuantitativo porque se mide con números. El color, país y tipo de sangre son datos cualitativos."
          },
          {
            type: "match",
            q: "Empareja cada término con su descripción correcta:",
            pairs: [
              {left: "Dato cuantitativo", right: "Se mide con números"},
              {left: "Dato cualitativo", right: "Describe categorías"},
              {left: "Población", right: "Todos los individuos de estudio"},
              {left: "Muestra", right: "Subconjunto de la población"}
            ],
            feedback: "Los tipos de datos y los conceptos de población y muestra son fundamentales en estadística."
          }
        ]
      },
      {
        id: "1-2", name: "Tipos de datos", icon: "🗂️",
        questions: [
          {
            type: "multiple",
            q: "Un estudio registra las calificaciones de 30 estudiantes. ¿Cómo se llaman esos 30 estudiantes?",
            choices: ["La muestra","La población","Los parámetros","Los estadísticos"],
            correct: 0,
            feedback: "Si no se estudia a todos los alumnos de la escuela sino solo a 30, esos 30 forman la muestra del estudio."
          },
          {
            type: "tf",
            q: "Los datos discretos solo pueden tomar valores enteros (sin decimales).",
            correct: true,
            feedback: "Los datos discretos son contables y no tienen valores intermedios: número de hijos, número de libros, etc."
          },
          {
            type: "multiple",
            q: "¿Cuál de los siguientes es un dato continuo?",
            choices: ["Número de estudiantes en un salón","Cantidad de libros en una biblioteca","Peso de una persona en kg","Número de goles en un partido"],
            correct: 2,
            feedback: "El peso puede tomar cualquier valor decimal (52.3 kg, 70.15 kg...), por eso es un dato continuo."
          },
          {
            type: "order",
            q: "Ordena los pasos del método estadístico correctamente:",
            items: ["Recolectar los datos","Definir el problema","Analizar e interpretar","Organizar los datos","Presentar conclusiones"],
            correctOrder: [1, 0, 3, 2, 4],
            feedback: "El método estadístico sigue: definir el problema → recolectar datos → organizar → analizar → concluir."
          },
          {
            type: "tf",
            q: "Una encuesta de 100 personas sobre el color favorito produce datos cualitativos.",
            correct: true,
            feedback: "El color favorito es una categoría, no un número, por tanto es dato cualitativo nominal."
          },
          {
            type: "fill",
            q: "Completa: Los datos que se pueden contar y no tienen valores intermedios se llaman datos ___.",
            answer: "discretos",
            hints: ["empieza con 'd'", "lo contrario de continuo"],
            feedback: "Los datos discretos son aquellos que solo toman valores enteros contables: 0, 1, 2, 3..."
          }
        ]
      },
      {
        id: "1-3", name: "Mini quiz de repaso", icon: "⚡",
        timed: true,
        questions: [
          {
            type: "multiple",
            q: "¿Cuál es la diferencia principal entre muestra y población?",
            choices: ["La muestra es más grande que la población","La muestra es un subconjunto de la población","Son exactamente lo mismo","La población siempre tiene menos datos"],
            correct: 1,
            feedback: "La población incluye TODOS los individuos de estudio; la muestra es solo una parte seleccionada de ella."
          },
          {
            type: "tf",
            q: "El número de accidentes de tráfico en una ciudad es un dato discreto.",
            correct: true,
            feedback: "Sí, porque los accidentes se cuentan en enteros: no puede haber 2.5 accidentes."
          },
          {
            type: "multiple",
            q: "¿Qué tipo de datos son las calificaciones 8, 9, 7, 10 de un examen?",
            choices: ["Cualitativos","Cuantitativos discretos","Cuantitativos continuos","Ninguna de las anteriores"],
            correct: 1,
            feedback: "Las calificaciones son números enteros y contables, por lo que son datos cuantitativos discretos."
          },
          {
            type: "tf",
            q: "La estadística solo se usa en matemáticas, no en otras ciencias.",
            correct: false,
            feedback: "¡Falso! La estadística se aplica en biología, medicina, economía, psicología, ingeniería y muchas otras áreas."
          },
          {
            type: "multiple",
            q: "¿Qué se hace con los datos antes de analizarlos?",
            choices: ["Se eliminan los que parecen incorrectos","Se organizan en tablas o listas","Se suman todos","Se presentan directamente sin orden"],
            correct: 1,
            feedback: "Organizar los datos (en tablas, listas o gráficas) es esencial para poder analizarlos correctamente."
          }
        ]
      }
    ]
  },

  // LESSON 2
  {
    id: 2, title: "Media aritmética", icon: "➕",
    sub: "Cálculo e interpretación del promedio",
    unit: "UNIDAD 2: MEDIDAS DE TENDENCIA CENTRAL",
    phases: [
      {
        id: "2-1", name: "¿Qué es la media?", icon: "🧮",
        questions: [
          {
            type: "multiple",
            q: "La media aritmética se calcula como:",
            choices: ["El valor que más se repite","La suma de todos los datos dividida entre la cantidad de datos","El valor central cuando los datos están ordenados","La diferencia entre el mayor y el menor valor"],
            correct: 1,
            feedback: "Media = Σx / n. Es decir, suma de todos los valores dividida entre el número total de datos."
          },
          {
            type: "multiple",
            q: "Las calificaciones de Ana son: 8, 6, 9, 7, 10. ¿Cuál es su media?",
            choices: ["7","8","9","10"],
            correct: 1,
            feedback: "Suma = 8+6+9+7+10 = 40. Media = 40 ÷ 5 = 8. ¡La media de Ana es 8!"
          },
          {
            type: "tf",
            q: "La media siempre debe ser un valor que aparezca en el conjunto de datos original.",
            correct: false,
            feedback: "Falso. La media puede ser un valor decimal que no aparezca en los datos. Por ejemplo: datos 3, 4 → media = 3.5"
          },
          {
            type: "fill",
            q: "Los pesos (kg) de 4 personas son: 60, 70, 80, 90. La media es ___.",
            answer: "75",
            feedback: "Suma = 60+70+80+90 = 300. Media = 300 ÷ 4 = 75 kg."
          },
          {
            type: "multiple",
            q: "Un alumno obtiene 6, 8, 7, 5, 9 en cinco materias. ¿Cuál es su promedio?",
            choices: ["6","7","7.5","8"],
            correct: 1,
            feedback: "Suma = 6+8+7+5+9 = 35. Media = 35 ÷ 5 = 7. ¡El promedio del alumno es 7!"
          },
          {
            type: "tf",
            q: "Si todos los datos de un conjunto son iguales, la media es igual a ese valor.",
            correct: true,
            feedback: "Correcto. Si tienes 5, 5, 5, 5 → Media = (5+5+5+5)/4 = 20/4 = 5."
          }
        ]
      },
      {
        id: "2-2", name: "Calculando la media", icon: "🔢",
        questions: [
          {
            type: "multiple",
            q: "Las temperaturas de una semana (°C) fueron: 20, 22, 18, 25, 23, 19, 21. ¿Cuál es la media?",
            choices: ["20","21","21.14","22"],
            correct: 2,
            feedback: "Suma = 20+22+18+25+23+19+21 = 148. Media = 148 ÷ 7 ≈ 21.14 °C."
          },
          {
            type: "fill",
            q: "Un equipo anotó 3, 5, 2, 4, 6 goles en cinco partidos. La media de goles por partido es ___.",
            answer: "4",
            feedback: "Suma = 3+5+2+4+6 = 20. Media = 20 ÷ 5 = 4 goles por partido."
          },
          {
            type: "tf",
            q: "La media es sensible a valores extremos (muy altos o muy bajos).",
            correct: true,
            feedback: "Sí. Un valor muy extremo puede elevar o bajar mucho la media. Por eso a veces se usan la mediana o la moda."
          },
          {
            type: "multiple",
            q: "Si la media de 4 números es 15 y tres de ellos son 10, 18 y 12, ¿cuál es el cuarto número?",
            choices: ["18","20","25","22"],
            correct: 1,
            feedback: "Media = 15 → Suma total = 15×4 = 60. Suma conocida = 10+18+12 = 40. Cuarto = 60−40 = 20."
          },
          {
            type: "multiple",
            q: "Los salarios (en miles de pesos) de 5 empleados son: 8, 10, 9, 11, 12. ¿Cuál es la media salarial?",
            choices: ["9 mil","10 mil","11 mil","8 mil"],
            correct: 1,
            feedback: "Suma = 8+10+9+11+12 = 50. Media = 50 ÷ 5 = 10 mil pesos."
          },
          {
            type: "tf",
            q: "Si se agrega un dato igual a la media al conjunto, la media no cambia.",
            correct: true,
            feedback: "Correcto. Añadir un valor igual a la media no altera el promedio del conjunto."
          }
        ]
      },
      {
        id: "2-3", name: "Reto contrarreloj", icon: "⏱️",
        timed: true,
        questions: [
          {
            type: "multiple",
            q: "Datos: 4, 8, 6, 2, 5. ¿Media?",
            choices: ["4","5","6","25"],
            correct: 1,
            feedback: "Suma = 4+8+6+2+5 = 25. Media = 25 ÷ 5 = 5."
          },
          {
            type: "tf",
            q: "La media de los datos 10, 20, 30 es 20.",
            correct: true,
            feedback: "Suma = 10+20+30 = 60. Media = 60 ÷ 3 = 20. ¡Correcto!"
          },
          {
            type: "multiple",
            q: "Si la media de 6, x, 10 es 8, ¿cuánto vale x?",
            choices: ["6","8","10","12"],
            correct: 1,
            feedback: "Media = 8 → Suma = 24. 6 + x + 10 = 24 → x = 8."
          },
          {
            type: "tf",
            q: "La media de 1, 2, 3, 4, 5 es 3.",
            correct: true,
            feedback: "Suma = 15. Media = 15 ÷ 5 = 3. ¡Exacto!"
          },
          {
            type: "multiple",
            q: "¿Cuál es la media de 0, 0, 0, 12?",
            choices: ["0","3","4","12"],
            correct: 1,
            feedback: "Suma = 12. Media = 12 ÷ 4 = 3. El cero sí cuenta en la cantidad de datos."
          }
        ]
      }
    ]

  xp: 0,
  streak: 0,
  completedPhases: {},
  lastActivity: null
};

let currentLesson = null;
let currentPhase = null;
let currentQuestions = [];
let currentQIdx = 0;
let hearts = 3;

let wrongCount = 0;
let timerInterval = null;

let answered = false;

let orderState = { items: [], dragging: null };
let dragDropState = {};

// ============================================================
// PERSISTENCE
// ============================================================
function saveState() {
  try { localStorage.setItem('estaduo_state', JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const s = localStorage.getItem('estaduo_state');
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e){}
}

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goToMap() {
  stopTimer();
  renderMap();
  showScreen('map-screen');
}

function goToLesson(lessonIdx) {
  currentLesson = LESSONS[lessonIdx];
  renderLessonDetail();
  showScreen('lesson-screen');
}

// ============================================================
// MAP RENDER
// ============================================================
function renderMap() {
  const xpEl = document.getElementById('xp-display');
  const streakEl = document.getElementById('streak-display');
  if (xpEl) xpEl.textContent = state.xp;
  if (streakEl) streakEl.textContent = state.streak;

  // Course progress
  let totalPhases = 0, donePhasesCount = 0;
  LESSONS.forEach(l => l.phases.forEach(p => { totalPhases++; if (state.completedPhases[p.id]) donePhasesCount++; }));
  const pct = Math.round((donePhasesCount / totalPhases) * 100);
  const fill = document.getElementById('course-progress-fill');
  if (fill) fill.style.width = pct + '%';

  const container = document.getElementById('lessons-container');
  if (!container) return;
  container.innerHTML = '';

  let lastUnit = '';
  LESSONS.forEach((lesson, idx) => {
    const lessonDone = lesson.phases.every(p => state.completedPhases[p.id]);
    const prevDone = idx === 0 || LESSONS[idx-1].phases.every(p => state.completedPhases[p.id]);
    const isLocked = !prevDone && idx > 0;
    const donePhases = lesson.phases.filter(p => state.completedPhases[p.id]).length;

    if (lesson.unit !== lastUnit) {
      lastUnit = lesson.unit;
      const unitLabel = document.createElement('div');
      unitLabel.className = 'unit-label';
      unitLabel.innerHTML = `<div class="unit-label-inner">${lesson.unit}</div>`;
      container.appendChild(unitLabel);
    }

    const path = document.createElement('div');
    path.className = 'lesson-path';

    const row = document.createElement('div');
    row.className = 'lesson-node-row';

    const btn = document.createElement('button');
    btn.className = 'lesson-btn' + (isLocked ? ' locked' : '') + (lessonDone ? ' completed' : '');
    
    let starsHtml = '';
    for (let i = 0; i < 3; i++) {
      starsHtml += `<span class="lesson-star">${i < donePhases ? '⭐' : '☆'}</span>`;
    }

    btn.innerHTML = `
      ${lessonDone ? '<div class="lesson-crown">👑</div>' : ''}
      <div class="lesson-icon">${lesson.icon}</div>
      <div class="lesson-stars">${starsHtml}</div>
    `;

    if (!isLocked) {
      btn.onclick = () => goToLesson(idx);
    }

    const card = document.createElement('div');
    card.className = 'lesson-card';
    const phaseDots = lesson.phases.map(p =>
      `<div class="phase-dot${state.completedPhases[p.id] ? ' done' : ''}"></div>`
    ).join('');
    card.innerHTML = `
      <div class="lesson-card-title">${lesson.id}. ${lesson.title}</div>
      <div class="lesson-card-phases">${phaseDots}</div>
    `;

    row.appendChild(btn);
    row.appendChild(card);
    path.appendChild(row);
    container.appendChild(path);
  });
}

// ============================================================
// LESSON DETAIL
// ============================================================
function renderLessonDetail() {
  document.getElementById('lesson-header-title').textContent = `Lección ${currentLesson.id}`;
  document.getElementById('lesson-detail-title').textContent = `${currentLesson.icon} ${currentLesson.title}`;
  document.getElementById('lesson-detail-sub').textContent = currentLesson.sub;

  const grid = document.getElementById('phases-grid');
  grid.innerHTML = '';

  currentLesson.phases.forEach((phase, idx) => {
    const done = state.completedPhases[phase.id];
    const prevDone = idx === 0 || state.completedPhases[currentLesson.phases[idx-1].id];
    const isLocked = !prevDone && idx > 0;

    const card = document.createElement('div');
    card.className = 'phase-card' + (isLocked ? ' locked' : '') + (done ? ' completed' : '');

    const qCount = phase.questions.length;
    const badgeText = done ? '✓ Completada' : (isLocked ? '🔒 Bloqueada' : 'Jugar');

    card.innerHTML = `
      <div class="phase-icon-wrap">${done ? '🏅' : phase.icon}</div>
      <div class="phase-card-info">
        <div class="phase-card-title">Fase ${idx+1}: ${phase.name}</div>
        <div class="phase-card-sub">${phase.timed ? '⏱️ Contrarreloj — ' : ''}<span>${qCount} preguntas</span></div>
      </div>
      <div class="phase-badge">${badgeText}</div>
    `;

    if (!isLocked) {
      card.onclick = () => startPhase(phase);
    }

    grid.appendChild(card);
  });
}

// ============================================================
// QUIZ ENGINE
// ============================================================
function startPhase(phase) {
  currentPhase = phase;
  currentQuestions = [...phase.questions];
  // Shuffle for variety
  currentQuestions = currentQuestions.sort(() => Math.random() > 0.5 ? 1 : -1);
  currentQIdx = 0;
  hearts = 3;
  correctCount = 0;
  wrongCount = 0;
  answered = false;
  selectedAnswer = null;

  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  selectedAnswer = null;
  matchState = { leftSelected: null, matched: [] };
  
  const q = currentQuestions[currentQIdx];
  const total = currentQuestions.length;

  // Progress
  const pct = (currentQIdx / total) * 100;
  document.getElementById('quiz-progress-fill').style.width = pct + '%';

  // Hearts
  let heartsHtml = '';
  for (let i = 0; i < 3; i++) heartsHtml += i < hearts ? '❤️' : '🖤';
  document.getElementById('quiz-hearts').innerHTML = heartsHtml;

  // Reset check button
  const btn = document.getElementById('btn-check');
  btn.className = 'btn-check';
  btn.textContent = 'COMPROBAR';

  // Clear feedback
  document.getElementById('feedback-area').innerHTML = '';

  // Render question
  const content = document.getElementById('quiz-content');
  content.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'question-wrap';

  stopTimer();
  if (currentPhase.timed) {
    timeLeft = 30;
    wrap.innerHTML += `<div class="timer-wrap"><div class="timer-circle" id="timer-circle">30</div></div>`;
  }

  const typeLabels = {
    multiple: 'SELECCIÓN MÚLTIPLE', tf: 'VERDADERO O FALSO',
    fill: 'COMPLETAR', match: 'EMPAREJAR', order: 'ORDENAR',
    graph: 'INTERPRETAR GRÁFICA', context: 'ANÁLISIS'
  };

  wrap.innerHTML += `<div class="question-type-badge">${typeLabels[q.type] || 'PREGUNTA'}</div>`;

  if (q.context) {
    wrap.innerHTML += `<div class="question-context"><strong>📋 Información:</strong><br>${q.context.replace(/\n/g,'<br>').replace(/\|(.+)\|/g, renderTableRow)}</div>`;
  }

  wrap.innerHTML += `<div class="question-text">${q.q}</div>`;

  let interactiveHtml = '';

  if (q.type === 'multiple' || q.type === 'context') {
    interactiveHtml = renderMultipleChoice(q);
  } else if (q.type === 'tf') {
    interactiveHtml = renderTrueFalse(q);
  } else if (q.type === 'fill') {
    interactiveHtml = renderFill(q);
  } else if (q.type === 'match') {
    interactiveHtml = renderMatch(q);
  } else if (q.type === 'order') {
    interactiveHtml = renderOrder(q);
  } else if (q.type === 'graph') {
    interactiveHtml = renderGraph(q);
  }

  wrap.innerHTML += interactiveHtml;
  content.appendChild(wrap);

  if (q.type === 'match') initMatch(q);
  if (q.type === 'order') initOrder(q);

  if (currentPhase.timed) startTimer();
}

function renderMultipleChoice(q) {
  const letters = ['A','B','C','D'];
  let html = '<div class="choices-grid">';
  q.choices.forEach((c, i) => {
    html += `<button class="choice-btn" onclick="selectChoice(${i})" data-idx="${i}">
      <span class="choice-letter">${letters[i]}</span>
      <span>${c}</span>
    </button>`;
  });
  return html + '</div>';
}

function renderTrueFalse(q) {
  return `<div class="tf-grid">
    <button class="tf-btn true-btn" onclick="selectTF(true)">
      <span class="tf-icon">✅</span> VERDADERO
    </button>
    <button class="tf-btn false-btn" onclick="selectTF(false)">
      <span class="tf-icon">❌</span> FALSO
    </button>
  </div>`;
}

function renderFill(q) {
  return `<div class="fill-blank-area">
    <div class="blank-sentence">
      <span>Respuesta:</span>
      <input class="blank-input" id="fill-input" type="text" placeholder="escribe aquí..." 
        oninput="checkFillReady()" onkeydown="if(event.key==='Enter')checkAnswer()">
    </div>
  </div>`;
}

function renderMatch(q) {
  let leftHtml = '', rightHtml = '';
  const shuffledRight = [...q.pairs].sort(() => Math.random() > 0.5 ? 1 : -1);
  q.pairs.forEach((p, i) => {
    leftHtml += `<div class="match-item" id="ml-${i}" onclick="selectMatchLeft(${i})">${p.left}</div>`;
  });
  shuffledRight.forEach((p, i) => {
    const origIdx = q.pairs.findIndex(op => op.right === p.right);
    rightHtml += `<div class="match-item" id="mr-${origIdx}-${i}" data-orig="${origIdx}" onclick="selectMatchRight(${origIdx}, ${i})">${p.right}</div>`;
  });
  return `<div class="match-grid">
    <div class="match-col">${leftHtml}</div>
    <div class="match-col">${rightHtml}</div>
  </div><p class="question-sub">Toca un concepto de la izquierda y luego su definición en la derecha.</p>`;
}

function renderOrder(q) {
  let items = q.items.map((item, i) => ({ text: item, origIdx: i }));
  items = items.sort(() => Math.random() > 0.5 ? 1 : -1);
  orderState.items = items;

  return `<div class="order-list" id="order-list">
    ${items.map((item, i) => `
      <div class="order-item" draggable="true" data-pos="${i}" id="oi-${i}"
        ondragstart="orderDragStart(event, ${i})"
        ondragover="orderDragOver(event)"
        ondrop="orderDrop(event, ${i})"
        ondragend="orderDragEnd()">
        <span class="order-handle">⠿</span>
        <span class="order-num">${i+1}</span>
        <span>${item.text}</span>
      </div>
    `).join('')}
  </div>
  <p class="question-sub">Arrastra los elementos para ordenarlos correctamente.</p>`;
}

function renderGraph(q) {
  const g = q.graphData;
  const maxVal = Math.max(...g.values);
  let barsHtml = g.labels.map((label, i) => {
    const pct = (g.values[i] / maxVal) * 130;
    return `<div class="bar-group">
      <div class="bar" style="height:${pct}px; background:${g.colors[i]}">
        <span class="bar-val">${g.values[i]}</span>
      </div>
      <div class="bar-label">${label}</div>
    </div>`;
  }).join('');

  const choices = q.choices.map((c, i) => 
    `<button class="choice-btn" onclick="selectChoice(${i})" data-idx="${i}">
      <span class="choice-letter">${['A','B','C','D'][i]}</span>
      <span>${c}</span>
    </button>`
  ).join('');

  return `<div class="graph-container">
    <div class="bar-chart">${barsHtml}</div>
  </div>
  <div class="choices-grid">${choices}</div>`;
}

// INTERACTIONS
function selectChoice(idx) {
  if (answered) return;
  selectedAnswer = idx;
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
  });
  setCheckReady(true);
}

function selectTF(val) {
  if (answered) return;
  selectedAnswer = val;
  document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('selected'));
  const selector = val ? '.true-btn' : '.false-btn';
  document.querySelector(selector)?.classList.add('selected');
  setCheckReady(true);
}

function checkFillReady() {
  const input = document.getElementById('fill-input');
  setCheckReady(input && input.value.trim().length > 0);
}

function initMatch(q) {
  matchState = { leftSelected: null, matched: [], total: q.pairs.length, correct: 0 };
}

function selectMatchLeft(idx) {
  if (answered) return;
  if (matchState.matched.includes(idx)) return;
  matchState.leftSelected = idx;
  document.querySelectorAll('.match-item[id^="ml-"]').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById(`ml-${idx}`);
  if (el) el.classList.add('selected');
}

function selectMatchRight(origIdx, displayIdx) {
  if (answered) return;
  if (matchState.leftSelected === null) { showToast('Primero selecciona un concepto de la izquierda'); return; }
  const leftIdx = matchState.leftSelected;
  const isCorrect = leftIdx === origIdx;

  const colors = ['pair-1','pair-2','pair-3','pair-4'];
  const pairColor = colors[matchState.matched.length];

  if (isCorrect) {
    matchState.matched.push(leftIdx);
    matchState.correct = (matchState.correct || 0) + 1;
    const lEl = document.getElementById(`ml-${leftIdx}`);
    const rEl = document.getElementById(`mr-${origIdx}-${displayIdx}`);
    if (lEl) { lEl.classList.remove('selected'); lEl.classList.add('matched', pairColor); }
    if (rEl) rEl.classList.add('matched', pairColor);
    spawnParticles('✨', 3);

    if (matchState.matched.length === matchState.total) {
      setCheckReady(true);
      selectedAnswer = 'match_done';
    }
  } else {
    const lEl = document.getElementById(`ml-${leftIdx}`);
    const rEl = document.getElementById(`mr-${origIdx}-${displayIdx}`);
    if (lEl) lEl.classList.add('wrong-match');
    if (rEl) rEl.classList.add('wrong-match');
    setTimeout(() => {
      if (lEl) lEl.classList.remove('wrong-match', 'selected');
      if (rEl) rEl.classList.remove('wrong-match');
    }, 600);
    matchState.leftSelected = null;
  }
}

function initOrder(q) {
  // Already set in renderOrder
}

let dragSrcIdx = null;
function orderDragStart(e, idx) {
  dragSrcIdx = idx;
  e.currentTarget.classList.add('dragging');
}
function orderDragOver(e) {
  e.preventDefault();
  document.querySelectorAll('.order-item').forEach(el => {
    el.classList.remove('drag-over-top','drag-over-bottom');
  });
  e.currentTarget.classList.add('drag-over-top');
}
function orderDrop(e, targetIdx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;

  const items = [...document.querySelectorAll('.order-item')];
  const srcEl = items[dragSrcIdx];
  const tgtEl = items[targetIdx];

  if (dragSrcIdx < targetIdx) {
    tgtEl.parentNode.insertBefore(srcEl, tgtEl.nextSibling);
  } else {
    tgtEl.parentNode.insertBefore(srcEl, tgtEl);
  }

  // Reindex
  document.querySelectorAll('.order-item').forEach((el, i) => {
    el.setAttribute('data-pos', i);
    el.querySelector('.order-num').textContent = i + 1;
    el.setAttribute('ondragstart', `orderDragStart(event, ${i})`);
    el.setAttribute('ondrop', `orderDrop(event, ${i})`);
  });

  dragSrcIdx = null;
  setCheckReady(true);
  selectedAnswer = 'order_pending';
}
function orderDragEnd() {
  document.querySelectorAll('.order-item').forEach(el => {
    el.classList.remove('dragging','drag-over-top','drag-over-bottom');
  });
  dragSrcIdx = null;
}

// CHECK ANSWER
function checkAnswer() {
  if (answered) return;
  const btn = document.getElementById('btn-check');
  if (!btn.classList.contains('ready')) return;

  const q = currentQuestions[currentQIdx];
  stopTimer();
  answered = true;
  btn.style.display = 'none';

  let isCorrect = false;

  if (q.type === 'multiple' || q.type === 'context' || q.type === 'graph') {
    isCorrect = selectedAnswer === q.correct;
    document.querySelectorAll('.choice-btn').forEach((el, i) => {
      el.classList.add('disabled');
      if (i === q.correct) el.classList.add('correct');
      else if (i === selectedAnswer && !isCorrect) el.classList.add('wrong');
    });
  } else if (q.type === 'tf') {
    isCorrect = selectedAnswer === q.correct;
    document.querySelectorAll('.tf-btn').forEach(el => {
      el.classList.add('disabled');
      if ((el.classList.contains('true-btn') && q.correct) || (el.classList.contains('false-btn') && !q.correct)) el.classList.add('correct');
      else if (!isCorrect && el.classList.contains('selected')) el.classList.add('wrong');
    });
  } else if (q.type === 'fill') {
    const input = document.getElementById('fill-input');
    const userVal = input.value.trim().toLowerCase();
    const correctVal = q.answer.toLowerCase();
    isCorrect = userVal === correctVal;
    input.classList.add(isCorrect ? 'correct' : 'wrong');
    input.disabled = true;
    if (!isCorrect) input.value = q.answer;
  } else if (q.type === 'match') {
    isCorrect = matchState.correct === matchState.total;
  } else if (q.type === 'order') {
    const currentOrder = [...document.querySelectorAll('.order-item')].map(el => {
      const origText = el.querySelector('span:last-child').textContent;
      return q.items.indexOf(origText);
    });
    // Check if order matches correctOrder mapping
    const q_correctOrder = q.correctOrder;
    isCorrect = currentOrder.every((v, i) => v === q_correctOrder[i]);
  }

  showFeedback(isCorrect, q.feedback);

  if (isCorrect) {
    correctCount++;
    spawnParticles('⭐', 5);
    showXpPopup('+10 XP');
  } else {
    hearts--;
    wrongCount++;
    if (hearts <= 0) {
      setTimeout(() => { endPhase(false); }, 2000);
      return;
    }
  }
}

function showFeedback(isCorrect, text) {
  const area = document.getElementById('feedback-area');
  const cls = isCorrect ? 'correct-fb' : 'wrong-fb';
  const icon = isCorrect ? '🎉' : '💡';
  const title = isCorrect ? '¡Correcto!' : 'Respuesta correcta:';

  area.innerHTML = `<div class="feedback-bar ${cls}">
    <div class="feedback-inner">
      <div class="feedback-icon">${icon}</div>
      <div>
        <div class="feedback-title">${title}</div>
        <div class="feedback-text">${text}</div>
        <button class="btn-continue" onclick="nextQuestion()">CONTINUAR</button>
      </div>
    </div>
  </div>`;
}

function nextQuestion() {
  currentQIdx++;
  if (currentQIdx >= currentQuestions.length) {
    endPhase(true);
  } else {
    renderQuestion();
  }
}

function endPhase(completed) {
  stopTimer();
  const phaseId = currentPhase.id;
  const wasAlreadyDone = state.completedPhases[phaseId];

  if (completed && correctCount > wrongCount) {
    state.completedPhases[phaseId] = true;
    const xpEarned = correctCount * 10 + (hearts * 5);
    state.xp += xpEarned;
    if (!wasAlreadyDone) state.streak++;
    saveState();

    // Show complete screen
    const accuracy = Math.round((correctCount / currentQuestions.length) * 100);
    const total = currentQuestions.length;

    document.getElementById('stat-xp').textContent = '+' + xpEarned;
    document.getElementById('stat-correct').textContent = `${correctCount}/${total}`;
    document.getElementById('stat-accuracy').textContent = accuracy + '%';

    // Check if lesson complete
    const lessonDone = currentLesson.phases.every(p => state.completedPhases[p.id]);
    if (lessonDone && !wasAlreadyDone) {
      document.getElementById('complete-emoji').textContent = '🏆';
      document.getElementById('complete-title').textContent = '¡Lección completada!';
      document.getElementById('complete-sub').textContent = `Has dominado: ${currentLesson.title}`;
      spawnParticles('🌟', 12);
    } else {
      document.getElementById('complete-emoji').textContent = '🏅';
      document.getElementById('complete-title').textContent = '¡Fase completada!';
      document.getElementById('complete-sub').textContent = `${currentPhase.name} — ¡Sigue así!`;
      spawnParticles('⭐', 8);
    }

    showScreen('phase-complete');
  } else {
    showToast('¡Inténtalo de nuevo! 💪');
    goToLesson(LESSONS.indexOf(currentLesson));
  }
}

function afterPhase() {
  showScreen('lesson-screen');
  renderLessonDetail();
}

// TIMER
function startTimer() {
  timeLeft = 30;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      stopTimer();
      if (!answered) {
        answered = true;
        hearts--;
        showFeedback(false, currentQuestions[currentQIdx].feedback);
        if (hearts <= 0) setTimeout(() => endPhase(false), 2000);
      }
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-circle');
  if (!el) return;
  el.textContent = timeLeft;
  el.className = 'timer-circle' + (timeLeft <= 10 ? ' urgent' : '');
}

// UI HELPERS
function setCheckReady(ready) {
  const btn = document.getElementById('btn-check');
  if (!btn) return;
  btn.classList.toggle('ready', ready);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function confirmCloseQuiz() {
  if (confirm('¿Seguro que quieres salir? Perderás el progreso de esta fase.')) {
    stopTimer();
    goToLesson(LESSONS.indexOf(currentLesson));
  }
}

function spawnParticles(emoji, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emoji;
      p.style.left = (20 + Math.random() * 60) + 'vw';
      p.style.top = (30 + Math.random() * 40) + 'vh';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }, i * 80);
  }
}

function showXpPopup(text) {
  const p = document.createElement('div');
  p.className = 'xp-popup';
  p.textContent = text;
  p.style.left = (Math.random() * 60 + 20) + 'vw';
  p.style.top = '40vh';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1200);
}

function renderTableRow(match, cols) {
  const cells = cols.split('|').map(c => c.trim()).filter(c => c);
  return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
}

// ============================================================
// INIT
// ============================================================
function goToMap() {
  stopTimer();
  renderMap();
  showScreen('map-screen');
}

loadState();
renderMap();
</script>
