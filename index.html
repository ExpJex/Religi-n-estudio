<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departamentos y Capitales de Colombia</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#FFD700,#0033A0,#CE1126);
    background-size: 400% 400%;
    animation: gradient 8s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    background:white;
    width:90%;
    max-width:600px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
    position:relative;
    overflow:hidden;
}

h1{
    margin-bottom:10px;
    color:#0033A0;
}

#question{
    font-size:20px;
    margin:20px 0;
    min-height:50px;
}

.options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.option-btn{
    background:#f1f1f1;
}

.option-btn:hover{
    transform:scale(1.05);
    background:#ddd;
}

.correct{
    background:#4CAF50 !important;
    color:white;
}

.wrong{
    background:#f44336 !important;
    color:white;
}

#timer{
    font-size:18px;
    margin:10px 0;
    font-weight:bold;
}

#lifeline{
    margin:10px 0;
    background:#0033A0;
    color:white;
}

#result{
    font-size:20px;
    margin-top:20px;
}

.hidden{
    display:none;
}

.fade{
    animation: fadeIn 0.5s;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="container fade">
    <h1>Departamentos y Capitales de Colombia</h1>
    <div id="timer">Tiempo: 10</div>
    <div id="question"></div>

    <div class="options" id="options"></div>

    <button id="lifeline">Comodín 50/50</button>

    <div id="result" class="hidden"></div>
    <button id="restart" class="hidden">Volver a jugar</button>
</div>

<script>
// ---- Datos ----
const questions = [
{q:"¿Cuál es la capital de Antioquia?", correct:"Medellín", options:["Medellín","Cali","Barranquilla","Pereira"]},
{q:"¿Cuál es la capital del Valle del Cauca?", correct:"Cali", options:["Cali","Neiva","Montería","Tunja"]},
{q:"¿Cuál es la capital de Atlántico?", correct:"Barranquilla", options:["Santa Marta","Barranquilla","Cartagena","Sincelejo"]},
{q:"¿Cuál es la capital de Cundinamarca?", correct:"Bogotá", options:["Bogotá","Ibagué","Villavicencio","Pasto"]},
{q:"¿Cuál es la capital de Bolívar?", correct:"Cartagena", options:["Cartagena","Cúcuta","Popayán","Armenia"]}
];

let current = 0;
let score = 0;
let timer;
let timeLeft = 10;
let used5050 = false;

// ---- Sonidos ----
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const timeoutSound = new Audio("https://www.soundjay.com/buttons/sounds/beep-10.mp3");

function startTimer(){
    timeLeft = 10;
    document.getElementById("timer").textContent = "Tiempo: " + timeLeft;
    timer = setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").textContent = "Tiempo: " + timeLeft;
        if(timeLeft <= 0){
            clearInterval(timer);
            timeoutSound.play();
            nextQuestion();
        }
    },1000);
}

function loadQuestion(){
    if(current >= questions.length){
        showResult();
        return;
    }

    document.getElementById("question").textContent = questions[current].q;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    questions[current].options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.classList.add("option-btn");
        btn.onclick = ()=>selectAnswer(btn, opt);
        optionsDiv.appendChild(btn);
    });

    startTimer();
}

function selectAnswer(button, answer){
    clearInterval(timer);
    const correct = questions[current].correct;
    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach(btn=>{
        btn.disabled = true;
        if(btn.textContent === correct){
            btn.classList.add("correct");
        }
    });

    if(answer === correct){
        score++;
        correctSound.play();
    } else {
        button.classList.add("wrong");
        wrongSound.play();
    }

    setTimeout(nextQuestion,1500);
}

function nextQuestion(){
    current++;
    loadQuestion();
}

function showResult(){
    document.getElementById("question").classList.add("hidden");
    document.getElementById("options").classList.add("hidden");
    document.getElementById("lifeline").classList.add("hidden");
    document.getElementById("timer").classList.add("hidden");

    const result = document.getElementById("result");
    result.classList.remove("hidden");
    result.textContent = "Tu puntaje fue: " + score + " / " + questions.length;

    document.getElementById("restart").classList.remove("hidden");
}

document.getElementById("restart").onclick = ()=>{
    current = 0;
    score = 0;
    used5050 = false;

    document.getElementById("question").classList.remove("hidden");
    document.getElementById("options").classList.remove("hidden");
    document.getElementById("lifeline").classList.remove("hidden");
    document.getElementById("timer").classList.remove("hidden");
    document.getElementById("result").classList.add("hidden");
    document.getElementById("restart").classList.add("hidden");

    loadQuestion();
};

document.getElementById("lifeline").onclick = ()=>{
    if(used5050) return;

    const correct = questions[current].correct;
    const buttons = Array.from(document.querySelectorAll(".option-btn"));
    let wrongOptions = buttons.filter(btn => btn.textContent !== correct);

    // eliminar 2 incorrectas
    wrongOptions.sort(()=>0.5 - Math.random());
    wrongOptions.slice(0,2).forEach(btn=> btn.style.visibility="hidden");

    used5050 = true;
    document.getElementById("lifeline").disabled = true;
};

// iniciar
loadQuestion();
</script>

</body>
</html>
